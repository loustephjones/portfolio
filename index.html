<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Front-end developer and 3D artist portfolio"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/styling.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Concert+One&family=Karla:wght@400;700&family=Chewy&family=Montserrat:ital,wght@0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Front-end developer and 3D artist: Lou</title>
  </head>
  <body>
    <header>
      <div class="container" id="headerImage">
        <div data-aos="fade-up" data-aos-duration="1000">
          <h1>Lou Jones</h1>
        </div>
        <h3>Front-end developer and aspiring 3D artist</h3>
      </div>
    </header>
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <div class="donut">
            <img src="images/donut2.png" class="img-fluid" />
          </div>
        </div>
      </div>
    </div>

    <section class="projects">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <div data-aos="fade-up" data-aos-duration="1000">
              <h4>PROJECTS</h4>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <h2>Weather</h2>
          </div>
          <div class="col-md-4">
            <h2>Dino</h2>
          </div>
          <div class="col-md-4">
            <h2>Sample</h2>
          </div>
          <div class="row">
            <div class="col-md-4">
              <img
                src="images/weatherapp.png"
                class="img-fluid"
                id="weatherapp"
              />
            </div>
            <div class="col-md-4">
              <img src="images/dino.jpg" class="img-fluid" id="dinosaur" />
            </div>
            <div class="col-md-4">
              <img src="images/sample.jpg" class="img-fluid" id="sample" />
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="java.js"></script>
  </body>
</html>
